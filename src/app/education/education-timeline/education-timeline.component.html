<div class="w-full py-16 mt-32">
    <div class="h-1 mx-[15vw] rounded-xl bg-emerald-500/40 relative overflow-visible">

        @for (year of years; track year.label) {
            <div class="absolute -top-1 h-3 w-px bg-emerald-500/50" [style.left.%]="year.left">
                <span class="absolute -top-6 text-xs font-mono text-emerald-300/70" style="transform: translateX(-50%)">{{ year.label }}</span>
            </div>
        }

        <app-education-highlight class="absolute -top-3 z-10" [style.left.%]="21" position="bottom">
            <span slot="label">2019 - 2023</span>
            <span slot="title">Technical High School</span>
            <span slot="description">Finished IT Technician course with honours</span>
        </app-education-highlight>
        <app-education-highlight class="absolute -top-3 z-10" [style.left.%]="56" position="top">
            <span slot="label">2024 - present</span>
            <span slot="title">Bachelor's Degree</span>
            <span slot="description">Computer Science, WSB Merito Chorzów</span>
        </app-education-highlight>
        <div class="h-1 pt-1 bg-blue-500 absolute top-3 font-medium opacity-90 rounded-xl text-end" [style.left.%]="25" [style.width.%]="75">
            Full-time job
        </div>
    </div>
</div>
