<div class="relative flex flex-col items-center group">
    <div class="h-6 w-6 rounded-full bg-emerald-400 relative flex items-center justify-center cursor-pointer ring-2 ring-emerald-300/30 transition-all duration-300 group-hover:ring-emerald-300/60 group-hover:scale-110">
        <div class="h-2.5 w-2.5 rounded-full bg-slate-900"></div>
    </div>

    <div class="w-0.5 h-10 bg-emerald-400/60 absolute left-1/2 -translate-x-1/2" [class]="stemClasses"></div>

    <div class="absolute left-1/2 -translate-x-1/2 z-10" [class]="tooltipClasses">
        <div class="bg-slate-800 border border-emerald-500/30 rounded-xl px-4 py-3 shadow-xl shadow-black/40 w-48 backdrop-blur-sm">
            <div class="text-emerald-300 text-xs font-semibold uppercase tracking-widest mb-1">
                <ng-content select="[slot=label]"></ng-content>
            </div>
            <div class="text-slate-100 text-sm font-medium leading-snug">
                <ng-content select="[slot=title]"></ng-content>
            </div>
            <div class="text-slate-400 text-xs mt-1 leading-relaxed">
                <ng-content select="[slot=description]"></ng-content>
            </div>
        </div>
    </div>
</div>
