<article
  class="sm:pb-3 black mt-10 sm:mt-0 h-full flex flex-col border-page-border transition-colors duration-300">
  @if (this.project.images.length > 0) {
  <app-lightbox [images]="this.project.images" [alt]="('projects.' + this.project.name + '.imageAlt') | translate"
    class="flex-none h-64 mx-auto group mt-5 relative sm:pb-16">
    <div class="w-full h-full transition-all overflow-hidden relative">
      <div class="w-full h-full absolute z-20">
        <img [src]="this.project.images[0].src" [alt]="('projects.' + this.project.name + '.imageAlt') | translate"
          class="object-contain origin-center lg:scale-90" loading="lazy">
      </div>
      <img [src]="this.project.images[0].src" [alt]="('projects.' + this.project.name + '.imageAlt') | translate"
        class="-z-10 blur-sm h-full opacity-70" loading="lazy">
      <span
        class="block w-full bg-black h-full opacity-0 group-hover:opacity-60 blur transition-all absolute-center z-20">
      </span>
      <div class="hover-button text-primary-400 dark:text-primary-300 absolute-center">
        @if (this.project.url) {
        <a [href]="this.project.url" target="_blank" rel="noopener noreferrer" [attr.aria-label]="'a11y.visitProject' | translate"
          (click)="$event.stopPropagation()">
          <i class="ph-link"></i>
        </a>
        }
      </div>
    </div>
  </app-lightbox>
  }
  <div class="w-full p-2 sm:pb-5 grow">
    <h3
      class="text-4xl font-bold text-center mt-10 md:mt-4 font-josefin text-primary-500 dark:text-primary-400 stroke w-full">
      {{ ('projects.'+this.project.name+'.title') | translate }}</h3>
    <div
      class="basis-full text-center mx-5 mt-4 font-lato text-base lg:text-lg tracking-tight leading-tight text-page-foreground/80 transition-colors duration-300">
      @for (paragraph of ('projects.'+this.project.name+'.description') | translate; track
      paragraph) {
      <p class="mt-1">{{ paragraph }}</p>
      }
    </div>
  </div>
  <app-tag-bar class="w-full mt-auto basis-32 xl:basis-0"
    [tags]="this.tags"></app-tag-bar>
</article>
