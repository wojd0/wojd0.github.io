<div class="absolute right-1 top-1 flex gap-2 z-50">
  <button (click)="this.toggleDarkMode()" [attr.aria-label]="'a11y.toggleDarkMode' | translate"
    class="h-8 w-8 p-1 bg-primary-500 dark:bg-primary-700 rounded-xl hover:scale-110 transition-all cursor-pointer grid place-items-center text-white border-none shadow-sm">
    <i class="text-xl ph" [class]="this.darkMode() ? 'ph-sun' : 'ph-moon'"></i>
  </button>
  <button (click)="this.toggleLanguage()" [attr.aria-label]="'a11y.switchLanguage' | translate"
    class="h-8 w-8 p-1 bg-primary-500 dark:bg-primary-700 rounded-xl hover:scale-110 transition-all cursor-pointer grid place-items-center shadow-sm border-none">
    <img class="h-full w-auto" [src]="this.flag()" [alt]="'a11y.switchToLanguage' | translate" a-hideNotLoaded />
  </button>
</div>
<button class="opacity-0 text-3xl hover:opacity-100 absolute top-0 left-0" [attr.aria-label]="'a11y.reset' | translate"
  (click)="this.secret()">🤫</button>
<main class="">
  <section id="hero">
    <app-about class="block mb-30 mt-20"></app-about>
  </section>

  <section id="education">
    @defer (on viewport; prefetch on idle) {
      <app-heading text="about.education" class="block mb-8"></app-heading>
      <app-education-timeline class="block py-16 mt-52 md:mt-32"></app-education-timeline>
    } @placeholder {
      <div class="h-96"></div>
    }
  </section>

  <section id="experience">
    @defer (on viewport; prefetch on idle) {
      <app-heading text="about.experience" class="block mb-8"></app-heading>
      <app-experience-timeline class="block my-10"></app-experience-timeline>
    } @placeholder {
      <div class="h-96"></div>
    }
  </section>

  <section id="work">
    @defer (on viewport; prefetch on idle) {
      <app-heading text="about.work" class="block mb-8"></app-heading>
      <app-list type="work" class="block my-10"></app-list>
    } @placeholder {
      <div class="h-96"></div>
    }
  </section>

  <app-hr></app-hr>

  <section id="projects">
    @defer (on viewport; prefetch on idle) {
      <app-heading text="about.projects" class="block mb-8"></app-heading>
      <app-list type="projects" class="block my-10"></app-list>
    } @placeholder {
      <div class="h-96"></div>
    }
  </section>
</main>
<footer class="pt-10 pb-1 text-center font-bahnschrift">
  <i class="ph ph-copyright"></i>&nbsp;Wojciech Duda 2026
</footer>
